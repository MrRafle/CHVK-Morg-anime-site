services:
  # ====================== POSTGRESQL DATABASE ======================
  postgres:
    image: postgres:15-alpine
    container_name: yummy-anime-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yummy-network
    restart: unless-stopped

  # ====================== NODE.JS APPLICATION ======================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yummy-anime-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    volumes:
      - ./public:/app/public
    networks:
      - yummy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  yummy-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
